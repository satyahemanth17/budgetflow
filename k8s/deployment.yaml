apiVersion: apps/v1
kind: Deployment
metadata:
  name: budgetflow-api
  namespace: default
  labels:
    app: budgetflow-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: budgetflow-api
  template:
    metadata:
      labels:
        app: budgetflow-api
    spec:
      containers:
        - name: budgetflow-api
          image: budgetflow-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: budgetflow-config
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: budgetflow-secrets
                  key: db-connection
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: budgetflow-secrets
                  key: redis-connection
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: budgetflow-secrets
                  key: jwt-key
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
